<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">    
    <title>Gofile - Free file sharing and storage platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #141d2a;
            color: #bdc8d3;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        
        aside {
            width: 240px;
            background-color: #192330;
            border-right: 1px solid #222f3e;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            flex-shrink: 0;
            transition: transform 0.3s ease, margin-left 0.3s ease;
            z-index: 1000;
            transform: translateX(0);
            margin-left: 0;
        }

        body.sidebar-toggled aside {
            transform: translateX(-240px);
            margin-left: -240px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            text-decoration: none;
            margin-bottom: 24px;
            padding-left: 6px;
        }

        .account-selector {
            background-color: #202c3c;
            border: 1px solid #34495e;
            border-radius: 6px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .account-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #ffffff;
        }
        .account-avatar {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: linear-gradient(45deg, #f35588, #05dfd7);
        }

        .btn-add-account {
            background-color: #1877f2;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 24px;
            width: 100%;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            list-style: none;
        }
        .nav-item a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            color: #bdc8d3;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
        }
        .nav-item.active a, .nav-item a:hover {
            background-color: #202c3c;
            color: #ffffff;
        }
        .nav-item a i {
            width: 18px;
            font-size: 16px;
            text-align: center;
            color: #94a3b8;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }
        body.sidebar-toggled .sidebar-overlay { display: block; }

        
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background-color: #141d2a;
            transition: all 0.3s ease;
        }

        .top-navbar {
            height: 60px;
            background-color: #192330;
            border-bottom: 1px solid #222f3e;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }
        
        .btn-toggle-menu {
            background-color: #1c2838;
            color: #bdc8d3;
            border: 1px solid #2d3d52;
            width: 38px;
            height: 38px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn-toggle-menu:hover { background-color: #202c3c; color: #ffffff; border-color: #1877f2; }

        main {
            flex: 1;
            padding: 24px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .folder-root-info { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
        .folder-large-icon { position: relative; font-size: 42px; color: #f59f00; }
        .folder-large-badge { position: absolute; bottom: 0; left: -4px; background-color: #2b3a4a; color: #ffffff; font-size: 10px; font-weight: bold; padding: 1px 5px; border-radius: 10px; border: 2px solid #141d2a; }
        .folder-title-details h2 { font-size: 18px; font-weight: 700; color: #ffffff; }
        .folder-title-details p { font-size: 12px; color: #627d98; margin-top: 2px; }
        .badge-status { display: inline-block; background-color: #2d3748; color: #a0aec0; font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-top: 4px; }
        .btn-more-options { background-color: #202c3c; border: 1px solid #34495e; color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 6px; }

       
        .gofile-toolbar { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #222f3e; 
            padding-bottom: 16px; 
            align-items: center; 
        }

        .tool-btn { background-color: #202c3c; color: #ced5e0; border: 1px solid #2d3d52; padding: 7px 14px; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; height: 38px; }
        .tool-btn:hover { background-color: #29394e; color: #fff; }
        .tool-btn.btn-share { background-color: #2ecc71; color: white; border: none; }
        .tool-btn.btn-create-folder { background-color: #1877f2; color: white; border: none; }
        .tool-btn.btn-upload { background-color: #1877f2; color: white; border: none; }

       
        .file-list-container { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
        
        .file-row { 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start;
            background-color: transparent; 
            position: relative; 
            border-bottom: 1px solid #1e293b; 
            padding-bottom: 16px; 
            gap: 16px;
        }

        .file-media-render-zone {
            display: flex;
            flex-shrink: 0;
        }

        .preview-card-box {
            width: 140px;
            height: 90px;
            background-color: #000000;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #1e293b;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .preview-card-box video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background-color: #000000;
        }
        
        .preview-card-box::after {
            content: '\f04b';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.4);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .preview-card-box:hover::after { opacity: 1; }

        .file-top-control-bar {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            gap: 14px;
            height: 90px;
        }

        .file-header-info { 
            display: flex; 
            flex-direction: column; 
            flex: 1;
            min-width: 0;
        }
        .file-name { font-size: 15px; font-weight: 600; color: #ffffff; word-break: break-all; line-height: 1.4; }
        .file-meta-sub { font-size: 12px; color: #627d98; margin-top: 4px; display: flex; flex-direction: row; gap: 12px; }

        .file-actions-right { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex-shrink: 0;
            margin-left: auto;
        }
        .btn-gofile-action { background-color: #192330; color: #ffffff; border: 1px solid #2d3d52; padding: 6px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-gofile-action:hover { background-color: #253346; }
        .btn-more-vertical { background-color: transparent; border: none; color: #627d98; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

       
        .file-row.is-expanded {
            flex-direction: column;
            gap: 12px;
        }
        .file-row.is-expanded .file-top-control-bar {
            width: 100%;
            height: auto;
        }
        .file-row.is-expanded .file-media-render-zone {
            width: 100%;
        }
        .file-row.is-expanded .preview-card-box { 
            width: 100%; 
            max-width: 720px; 
            height: auto; 
            aspect-ratio: 16 / 9; 
            cursor: default;
        }
        .file-row.is-expanded .preview-card-box::after { display: none; }
        .file-row.is-expanded .preview-card-box video { 
            object-fit: contain; 
        }
        
        .pagination-text { text-align: center; font-size: 13px; color: #627d98; margin: 20px 0 10px; }

        
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 24px 0 10px;
        }

        .pagination-container button {
            background-color: #192330;
            color: #ffffff;
            border: 1px solid #2d3d52;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
        }

        .pagination-container button:hover:not(:disabled) {
            background-color: #253346;
        }

        .pagination-container button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination-container span {
            font-size: 13px;
            color: #bdc8d3;
            font-weight: 500;
            min-width: 80px;
            text-align: center;
        }

       
        @media (max-width: 992px) {
            aside {
                position: fixed;
                height: 100vh;
                left: 0;
                top: 0;
                transform: translateX(-240px);
                margin-left: 0;
            }
            body.sidebar-toggled aside { transform: translateX(0); margin-left: 0; }
            body:not(.sidebar-toggled) .workspace { margin-left: 0; }
            body.sidebar-toggled .workspace { margin-left: 0; }

            .gofile-toolbar .tool-btn span { display: none; }
            .gofile-toolbar .tool-btn { padding: 10px 12px; font-size: 16px; justify-content: center; min-width: 42px; height: 42px; }
            .gofile-toolbar .tool-btn .fa-caret-down { display: none; }

            .file-row { gap: 12px; }
            .file-top-control-bar { flex-wrap: wrap; gap: 6px; height: auto; align-self: center; }
            .file-actions-right { width: 100%; margin-top: 4px; justify-content: flex-start; }
            
            .preview-card-box { 
                width: 120px !important; 
                height: 78px !important; 
            }
            
            .file-row.is-expanded .preview-card-box { 
                width: 100% !important; 
                height: auto !important; 
                aspect-ratio: 16 / 9;
            }
        }
      
        .file-row.is-expanded .preview-card-box iframe {
            width: 100%;
            height: 100%;
        }
     
.pagination-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px; 
    margin: 24px 0 10px;
}

.pagination-container button {
    background-color: #192330;
    color: #ffffff;
    border: 1px solid #2d3d52;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    min-width: 40px;
    transition: all 0.2s;
}

.pagination-container button:hover:not(:disabled) {
    background-color: #253346;
    border-color: #3b4e66;
}

.pagination-container button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}


.pagination-container button.active-page {
    background-color: #1877f2 !important;
    border-color: #1877f2 !important;
}
      
  
.sticky-ad-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 2000; 
    background-color: #141d2a;
    display: flex;
    justify-content: center;
    padding: 5px 0;
    border-bottom: 1px solid #222f3e;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}


.workspace {
    margin-top: 100px; 
}


@media (max-width: 768px) {
    .sticky-ad-container iframe {
        transform: scale(0.6);
        transform-origin: top center;
    }
    .sticky-ad-container {
        height: 70px;
    }
    .workspace {
        margin-top: 70px;
    }
}
