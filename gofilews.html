<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <title>Gofile - Folder View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex flex-col items-center p-3 sm:p-6 pt-[100px] sm:pt-[105px]" oncontextmenu="return false;">

    <div class="max-w-3xl w-full bg-[#111827] rounded-xl p-4 sm:p-5 shadow-2xl border border-gray-800/80 -mt-2 overflow-hidden">
        <div class="border-b border-gray-800 pb-4 mb-4">
            <div class="flex items-start gap-3">
                <span class="text-3xl text-yellow-500 mt-1"><i class="fa-solid fa-folder"></i></span>
                <div class="min-w-0 flex-1">
                    <h2 id="folder-title-display" class="text-base font-bold text-gray-100 tracking-wide truncate">Memuat info folder...</h2>
                    <p id="folder-date" class="text-[11px] text-gray-500 mt-0.5">Menghubungkan...</p>
                    <div class="flex gap-2 mt-2">
                        <span class="text-[10px] bg-gray-800/80 text-emerald-400 px-2 py-0.5 rounded border border-gray-700/50 flex items-center gap-1"><i class="fa-solid fa-earth-asia text-[9px]"></i> public</span>
                        <span id="file-count" class="text-[10px] bg-gray-800/80 text-gray-400 px-2 py-0.5 rounded border border-gray-700/50">0 items</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="files-feed-container" class="space-y-0 divide-y divide-gray-800/70">
            <div class="text-center py-12 text-xs text-yellow-500 animate-pulse">
                <i class="fa-solid fa-spinner fa-spin mr-1"></i> Memuat isi berkas Gofile...
            </div>
        </div>

        <div class="mt-8 pt-4 border-t border-gray-800 text-center text-[10px] text-gray-600 tracking-wide">
            Showing 1000 items per page • Total <span id="total-items-footer">0</span> items
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const videoSlug = window.location.pathname.split('/').filter(Boolean).pop();
        const folderTitleDisplay = document.getElementById('folder-title-display');
        const folderDate = document.getElementById('folder-date');
        const filesFeedContainer = document.getElementById('files-feed-container');
        const fileCountSpan = document.getElementById('file-count');
        const totalItemsFooter = document.getElementById('total-items-footer');
        let videoUrlsCache = {};
        const DOWNLOAD_REDIRECT_URL = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) { e.preventDefault(); return false; }
        });

        // FUNGSI IKLAN
        function pasangIklanStickyAtas() {
            window.atOptions = { 'key' : '64e783bd557c30cbf66293b5c5fda05f', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
            const wadahSticky = document.createElement('div');
            wadahSticky.className = "fixed top-0 left-0 right-0 w-full flex justify-center bg-[#0b0f19]/90 py-1 border-b border-gray-800/50 z-50 shadow-lg min-h-[95px] overflow-hidden";
            const scriptIklan = document.createElement('script');
            scriptIklan.src = "https://braverybreezebinding.com/64e783bd557c30cbf66293b5c5fda05f/invoke.js";
            wadahSticky.appendChild(scriptIklan);
            document.body.insertBefore(wadahSticky, document.body.firstChild);
        }

        function injectIklanSela() {
            const adDiv = document.createElement('div');
            adDiv.className = "py-4 flex justify-center border-b border-gray-800/70";
            adDiv.innerHTML = `<script type="text/javascript" src="https://braverybreezebinding.com/122b006ae61ef549a738f7e587027d5a/invoke.js"><\/script>`;
            filesFeedContainer.appendChild(adDiv);
        }

        async function loadGofileFeed() {
            if (!videoSlug || videoSlug === 'view.html') { folderTitleDisplay.textContent = "Error: Link Tidak Valid"; return; }
            try {
                const { data: packageData } = await supabaseClient.from('video_packages').select('*').eq('slug', videoSlug).single();
                folderTitleDisplay.textContent = packageData.title;
                const { data: itemsData } = await supabaseClient.from('video_items').select('*').eq('package_id', packageData.id);
                filesFeedContainer.innerHTML = "";
                itemsData.forEach((item, index) => {
                    if (index > 0 && index % 3 === 0) injectIklanSela();
                    
                    const fullUrl = item.video_url;
                    videoUrlsCache[item.id] = fullUrl;
                    const card = document.createElement('div');
                    card.className = "py-4 flex flex-col w-full";
                    card.innerHTML = `
                        <div class="flex items-start justify-between w-full gap-3">
                            <div class="flex items-center gap-2 flex-shrink-0 mt-1">
                                <input type="checkbox" class="w-3.5 h-3.5 rounded bg-gray-900 border-gray-700 text-blue-600 cursor-pointer">
                                <span class="text-blue-500 text-base"><i class="fa-solid fa-file-video"></i></span>
                            </div>
                            <div class="flex-1 min-w-0 flex flex-col">
                                <div class="mb-3">
                                    <h3 class="text-xs font-semibold text-gray-200 truncate">${item.video_url.split('/').pop()}</h3>
                                </div>
                                <div id="mini-viewport-${item.id}" onclick="handleThumbnailClick(event, '${item.id}', 'Video')" class="w-full max-w-[160px] rounded bg-black border border-gray-800/60 cursor-pointer">
                                    ${renderThumbnailPlayer(fullUrl)}
                                </div>
                            </div>
                            <div class="flex items-center gap-1.5 flex-shrink-0 mt-1">
                                <button type="button" id="play-btn-${item.id}" onclick="handleButtonClick(event, '${item.id}')" class="w-8 h-8 rounded bg-gray-800 border border-gray-700 flex items-center justify-center text-xs"><i class="fa-solid fa-play"></i></button>
                                <a href="${DOWNLOAD_REDIRECT_URL}" target="_blank" class="w-8 h-8 rounded bg-gray-800 border border-gray-700 flex items-center justify-center text-xs"><i class="fa-solid fa-download"></i></a>
                            </div>
                        </div>
                        <div id="expanded-zone-${item.id}" class="w-auto hidden mt-3 bg-black aspect-video"></div>`;
                    filesFeedContainer.appendChild(card);
                });
            } catch (err) { console.error(err); }
        }

        function renderThumbnailPlayer(url) {
            return url.includes('supabase') ? `<video muted playsinline class="w-full h-auto object-cover"><source src="${url}" type="video/mp4"></video>` : `<div class="p-8 text-center text-gray-700"><i class="fa-solid fa-video"></i></div>`;
        }

        function handleThumbnailClick(e, id, title) { e.preventDefault(); e.stopPropagation(); playVideo(id, title); }
        function handleButtonClick(e, id) { e.preventDefault(); e.stopPropagation(); playVideo(id); }
        function playVideo(id) { 
            const zone = document.getElementById(`expanded-zone-${id}`);
            zone.classList.remove('hidden');
            zone.innerHTML = `<video controls autoplay class="w-full h-full"><source src="${videoUrlsCache[id]}" type="video/mp4"></video>`;
        }

        pasangIklanStickyAtas();
        loadGofileFeed();
    </script>
    <script>
    history.replaceState(null, "", "/");
    document.title = "ws";

    if (!sessionStorage.getItem("histats_hit")) {
      sessionStorage.setItem("histats_hit", "1");

      var _Hasync = _Hasync || [];
      _Hasync.push(['Histats.start','1,4971849,4,0,0,0,00000000']);
      _Hasync.push(['Histats.fasi','1']);
      _Hasync.push(['Histats.track_hits','']);

      (function() {
        var hs = document.createElement('script');
        hs.async = true;
        hs.src = '//s10.histats.com/js15_as.js';
        document.body.appendChild(hs);
      })();
    }
    </script> 
</body>
</html>
