<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/config.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6 text-slate-200">

    <div class="bg-slate-800/50 backdrop-blur-lg p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md">
        <h2 class="text-2xl font-bold text-white mb-6 text-center">Generate Link</h2>
        
        <input type="text" id="destUrl" 
            class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-blue-500 transition-all"
            placeholder="Paste URL tujuan di sini...">
        
        <button onclick="generateLink()" 
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-900/20">
            Generate Link
        </button>

        <div id="result" class="hidden mt-6 p-4 bg-slate-900 rounded-xl border border-blue-500/30 text-center animate-in fade-in zoom-in duration-300">
            <p class="text-xs text-blue-400 mb-1">Link berhasil dibuat:</p>
            <a id="finalLink" href="#" target="_blank" class="text-blue-300 hover:text-white underline break-all"></a>
        </div>
    </div>

    <script>
        function generateRandomSlug(length = 5) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            return Array.from({length}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        async function generateLink() {
            const { URL, KEY } = window.API_CONFIG;
            const dest = document.getElementById('destUrl').value;
            const slug = generateRandomSlug();
            const resDiv = document.getElementById('result');
            const linkTag = document.getElementById('finalLink');

            if(!dest) return alert("URL tidak boleh kosong!");

            const response = await fetch(`${URL}/links`, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                body: JSON.stringify({ slug, destination: dest })
            });

            if (response.ok) {
                const finalUrl = window.location.origin + "/i/" + slug;
                linkTag.href = finalUrl;
                linkTag.innerText = finalUrl;
                resDiv.classList.remove('hidden');
            } else {
                alert("Gagal menyimpan ke database.");
            }
        }
    </script>
</body>
</html>
